{% extends "base.html" %}

{% block title %}Send Message - SMS Adherence Support System{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title mb-0">
                        <i class="bi bi-chat-dots"></i>
                        Send Message to Patient
                    </h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="patient_id" class="form-label">Select Patient *</label>
                            <select class="form-control" id="patient_id" name="patient_id" required>
                                <option value="">Choose a patient...</option>
                                {% for patient in patients %}
                                <option value="{{ patient.patient_id }}">
                                    {{ patient.name }} ({{ patient.phone_number }}) - {{ patient.treatment_type }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="message_type" class="form-label">Message Type *</label>
                            <select class="form-control" id="message_type" name="message_type" required>
                                <option value="">Select message type...</option>
                                {% for msg_type in message_types %}
                                <option value="{{ msg_type }}">{{ msg_type.replace('_', ' ').title() }}</option>
                                {% endfor %}
                                <option value="custom">Custom Message</option>
                            </select>
                        </div>

                        <div class="mb-3" id="custom_message_div" style="display: none;">
                            <label for="custom_message" class="form-label">Custom Message</label>
                            <textarea class="form-control" id="custom_message" name="custom_message" rows="4" 
                                      maxlength="160" placeholder="Enter your custom message (max 160 characters)"></textarea>
                            <small class="form-text text-muted">
                                <span id="char_count">0</span>/160 characters
                            </small>
                        </div>

                        <div class="card bg-light mb-3" id="message_preview" style="display: none;">
                            <div class="card-body">
                                <h6 class="card-title">Message Preview:</h6>
                                <div id="preview_content" class="border p-2 bg-white rounded"></div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i>
                                Back to Dashboard
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-send"></i>
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const messageTypeSelect = document.getElementById('message_type');
    const customMessageDiv = document.getElementById('custom_message_div');
    const customMessageTextarea = document.getElementById('custom_message');
    const charCount = document.getElementById('char_count');
    const messagePreview = document.getElementById('message_preview');
    const previewContent = document.getElementById('preview_content');

    // Message templates for preview
    const messageTemplates = {
        'daily_reminder': "Good morning! Time to take your medicine. Reply '1' if taken, or '2' if you need help.",
        'confirmation': "Thank you! We have recorded that you took your medicine today.",
        'help_received': "We received your help request. A healthcare worker will call you soon.",
        'missed_dose_warning': "You haven't taken your medicine today. Please take it now and reply '1' or '2' if you need help.",
        'treatment_completed': "Congratulations! You have successfully completed your treatment. Stay healthy!",
        'appointment_reminder': "Reminder: You have a clinic appointment tomorrow. Please make sure to attend on time.",
        'medication_refill': "Time to refill your medication. Visit the clinic this week or call for assistance."
    };

    messageTypeSelect.addEventListener('change', function() {
        if (this.value === 'custom') {
            customMessageDiv.style.display = 'block';
            messagePreview.style.display = 'none';
        } else if (this.value && messageTemplates[this.value]) {
            customMessageDiv.style.display = 'none';
            previewContent.textContent = messageTemplates[this.value];
            messagePreview.style.display = 'block';
        } else {
            customMessageDiv.style.display = 'none';
            messagePreview.style.display = 'none';
        }
    });

    customMessageTextarea.addEventListener('input', function() {
        const length = this.value.length;
        charCount.textContent = length;
        
        if (length > 160) {
            charCount.style.color = 'red';
            this.style.borderColor = 'red';
        } else {
            charCount.style.color = 'inherit';
            this.style.borderColor = 'inherit';
        }
        
        // Update preview for custom message
        if (messageTypeSelect.value === 'custom' && this.value) {
            previewContent.textContent = this.value;
            messagePreview.style.display = 'block';
        } else if (messageTypeSelect.value === 'custom') {
            messagePreview.style.display = 'none';
        }
    });

    // Form validation
    document.querySelector('form').addEventListener('submit', function(e) {
        const patientId = document.getElementById('patient_id').value;
        const messageType = messageTypeSelect.value;
        const customMessage = customMessageTextarea.value;

        if (!patientId) {
            alert('Please select a patient');
            e.preventDefault();
            return;
        }

        if (!messageType) {
            alert('Please select a message type');
            e.preventDefault();
            return;
        }

        if (messageType === 'custom' && !customMessage.trim()) {
            alert('Please enter a custom message');
            e.preventDefault();
            return;
        }

        if (customMessage.length > 160) {
            alert('Custom message is too long. Maximum 160 characters allowed.');
            e.preventDefault();
            return;
        }
    });
</script>
{% endblock %}
